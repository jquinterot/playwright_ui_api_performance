name: Performance Tests
on:
  push:
    branches: [main]
    paths:
      - 'performance/**'
      - '.github/workflows/performance_workflow.yml'
  pull_request:
    branches: [main]
    paths:
      - 'performance/**'
      - '.github/workflows/performance_workflow.yml'
  schedule:
    # Run performance tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  # Fast threshold test only
  k6_threshold_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - id: run_k6
        name: Run k6 threshold test
        uses: k6io/action@v0.1
        with:
          filename: performance/threshold_test.ts

      - name: Comment on PR if CI fails
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const stepOutcome = '${{ steps.run_k6.outcome }}';
            const failed = (stepOutcome !== 'success');
            if (failed) {
              const prNumber = (github.context.payload.pull_request && github.context.payload.pull_request.number) ||
                               (github.context.payload.issue && github.context.payload.issue.number);
              const body = 'CI Failure: Performance threshold test failed. See workflow run logs for details.';
              if (prNumber) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: body
                });
              } else {
                console.log('No PR context; skipping comment.');
              }
            }
